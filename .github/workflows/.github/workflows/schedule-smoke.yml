name: schedule-smoke

on:
    workflow_dispatch:
    schedule:
        - cron: '*/5 * * * *'

jobs:
    smoke:
        runs-on: ubuntu-latest
        steps:
            - name: Print time
              run: |
                  echo "UTC: $(date -u '+%F %T %Z')"
                  TZ='Asia/Shanghai' date '+BJT: %F %T %Z'
